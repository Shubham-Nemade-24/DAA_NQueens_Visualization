<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .text-title { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 800; fill: #1a1d2e; }
      .text-desc { font-family: 'Inter', sans-serif; font-size: 14px; fill: #555a78; font-weight: 500; }
      .text-code { font-family: 'JetBrains Mono', monospace; font-size: 13px; fill: #ef4444; font-weight: 700; }
      .cell-light { fill: #f0d9b5; }
      .cell-dark { fill: #b58863; }
      .queen-dark { font-size: 32px; font-family: sans-serif; fill: #1a1d2e; }
      .x-mark { stroke: #ef4444; stroke-width: 4; stroke-linecap: round; }
      .conflict-line { stroke: #ef4444; stroke-width: 3; stroke-dasharray: 4 4; fill: none; }
      .badge-text { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; fill: #ef4444; }
    </style>
  </defs>
  
  <rect width="600" height="400" class="bg" rx="12" />

  <!-- Layout: Board on left (240x240 @ 40,80), Explanations on right -->
  <text x="40" y="40" class="text-title">Brute Force Approach</text>
  <text x="40" y="60" class="text-desc">Generates complete boards first. Checks for conflicts later.</text>

  <!-- Chessboard Base (240x240, 60px cells) -->
  <g transform="translate(40, 80)">
    <!-- Row 0 -->
    <rect x="0" y="0" width="60" height="60" class="cell-light"/>
    <rect x="60" y="0" width="60" height="60" class="cell-dark"/>
    <rect x="120" y="0" width="60" height="60" class="cell-light"/>
    <rect x="180" y="0" width="60" height="60" class="cell-dark"/>
    <!-- Row 1 -->
    <rect x="0" y="60" width="60" height="60" class="cell-dark"/>
    <rect x="60" y="60" width="60" height="60" class="cell-light"/>
    <rect x="120" y="60" width="60" height="60" class="cell-dark"/>
    <rect x="180" y="60" width="60" height="60" class="cell-light"/>
    <!-- Row 2 -->
    <rect x="0" y="120" width="60" height="60" class="cell-light"/>
    <rect x="60" y="120" width="60" height="60" class="cell-dark"/>
    <rect x="120" y="120" width="60" height="60" class="cell-light"/>
    <rect x="180" y="120" width="60" height="60" class="cell-dark"/>
    <!-- Row 3 -->
    <rect x="0" y="180" width="60" height="60" class="cell-dark"/>
    <rect x="60" y="180" width="60" height="60" class="cell-light"/>
    <rect x="120" y="180" width="60" height="60" class="cell-dark"/>
    <rect x="180" y="180" width="60" height="60" class="cell-light"/>

    <!-- Example arrangement (all queens on same diagonal) -->
    <!-- R0 C0 -->
    <text x="30" y="42" text-anchor="middle" class="queen-dark">♛</text>
    <line x1="15" y1="15" x2="45" y2="45" class="x-mark"/>
    <line x1="45" y1="15" x2="15" y2="45" class="x-mark"/>

    <!-- R1 C1 -->
    <text x="90" y="102" text-anchor="middle" class="queen-dark">♛</text>
    <line x1="75" y1="75" x2="105" y2="105" class="x-mark"/>
    <line x1="105" y1="75" x2="75" y2="105" class="x-mark"/>
    
    <!-- R2 C2 -->
    <text x="150" y="162" text-anchor="middle" class="queen-dark">♛</text>
    <line x1="135" y1="135" x2="165" y2="165" class="x-mark"/>
    <line x1="165" y1="135" x2="135" y2="165" class="x-mark"/>

    <!-- R3 C3 -->
    <text x="210" y="222" text-anchor="middle" class="queen-dark">♛</text>
    <line x1="195" y1="195" x2="225" y2="225" class="x-mark"/>
    <line x1="225" y1="195" x2="195" y2="225" class="x-mark"/>

    <!-- Conflict Lines -->
    <line x1="40" y1="40" x2="200" y2="200" class="conflict-line"/>
  </g>

  <!-- Explanations on the right -->
  <g transform="translate(320, 90)">
    <!-- Point 1 -->
    <circle cx="10" cy="10" r="10" fill="#1a1d2e"/>
    <text x="10" y="15" text-anchor="middle" fill="#fff" font-size="12" font-family="sans-serif" font-weight="bold">1</text>
    <text x="30" y="15" class="text-desc"><tspan font-weight="700" fill="#1a1d2e">Generates</tspan> all 4 queens on board.</text>

    <!-- Point 2 -->
    <circle cx="10" cy="50" r="10" fill="#1a1d2e"/>
    <text x="10" y="55" text-anchor="middle" fill="#fff" font-size="12" font-family="sans-serif" font-weight="bold">2</text>
    <text x="30" y="47" class="text-desc">The specific layout shown here is</text>
    <text x="30" y="65" class="text-desc">just <tspan fill="#ef4444" font-weight="700">1 out of 256</tspan> possibilities.</text>

    <!-- Point 3 -->
    <circle cx="10" cy="100" r="10" fill="#1a1d2e"/>
    <text x="10" y="105" text-anchor="middle" fill="#fff" font-size="12" font-family="sans-serif" font-weight="bold">3</text>
    <text x="30" y="97" class="text-desc">Even though R0 and R1 already</text>
    <text x="30" y="115" class="text-desc">conflict, it keeps placing queens.</text>

    <!-- Point 4 -->
    <circle cx="10" cy="150" r="10" fill="#ef4444"/>
    <text x="10" y="155" text-anchor="middle" fill="#fff" font-size="12" font-family="sans-serif" font-weight="bold">4</text>
    <text x="30" y="155" class="text-desc">Wasteful checking of invalid boards!</text>

    <!-- Stats -->
    <rect x="0" y="200" width="230" height="40" rx="8" fill="rgba(239, 68, 68, 0.08)"/>
    <text x="115" y="225" text-anchor="middle" class="badge-text" fill="#ef4444">Inefficient Search: O(Nᴺ) = 256 Nodes</text>
  </g>
</svg>
