<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .text-title { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 800; fill: #1a1d2e; }
      .text-desc { font-family: 'Inter', sans-serif; font-size: 14px; fill: #555a78; font-weight: 500; line-height: 1.5; }
      .text-bold { font-weight: 700; fill: #1a1d2e; }
      .text-code { font-family: 'JetBrains Mono', monospace; font-size: 13px; fill: #6366f1; font-weight: 700; background: #f0f0f0; }
      .cell-light { fill: #f0d9b5; }
      .cell-dark { fill: #b58863; }
      .cell-dim { fill: #ffffff; opacity: 0.65; }
      .queen { font-size: 32px; font-family: sans-serif; fill: #ffffff; }
      .cell-highlight { fill: #6366f1; }
      
      .arrow { stroke: #ef4444; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .arrow-dashed { stroke: #ef4444; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 8 6; fill: none; }
      
      .check-icon { fill: #10b981; font-weight: bold; font-family: sans-serif; }
      .x-icon { fill: #ef4444; font-weight: bold; font-family: sans-serif; }
    </style>
    <!-- Arrowhead marker -->
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#ef4444" />
    </marker>
  </defs>
  
  <rect width="600" height="400" class="bg" rx="12" />

  <text x="40" y="40" class="text-title">Optimizing <tspan class="text-code">is_safe()</tspan></text>
  <text x="40" y="62" class="text-desc">Why we only need to check 3 directions instead of 8.</text>

  <!-- Chessboard (5x5, 46px cells) -->
  <g transform="translate(40, 90)">
    <!-- Row 0 -->
    <rect x="0" y="0" width="46" height="46" class="cell-light"/>
    <rect x="46" y="0" width="46" height="46" class="cell-dark"/>
    <rect x="92" y="0" width="46" height="46" class="cell-light"/>
    <rect x="138" y="0" width="46" height="46" class="cell-dark"/>
    <rect x="184" y="0" width="46" height="46" class="cell-light"/>
    <!-- Row 1 -->
    <rect x="0" y="46" width="46" height="46" class="cell-dark"/>
    <rect x="46" y="46" width="46" height="46" class="cell-light"/>
    <rect x="92" y="46" width="46" height="46" class="cell-dark"/>
    <rect x="138" y="46" width="46" height="46" class="cell-light"/>
    <rect x="184" y="46" width="46" height="46" class="cell-dark"/>
    <!-- Row 2 -->
    <rect x="0" y="92" width="46" height="46" class="cell-light"/>
    <rect x="46" y="92" width="46" height="46" class="cell-dark"/>
    <rect x="92" y="92" width="46" height="46" class="cell-highlight"/> <!-- QUEEN -->
    <rect x="138" y="92" width="46" height="46" class="cell-dark"/>
    <rect x="184" y="92" width="46" height="46" class="cell-light"/>
    <!-- Row 3 -->
    <rect x="0" y="138" width="46" height="46" class="cell-dark"/>
    <rect x="46" y="138" width="46" height="46" class="cell-light"/>
    <rect x="92" y="138" width="46" height="46" class="cell-dark"/>
    <rect x="138" y="138" width="46" height="46" class="cell-light"/>
    <rect x="184" y="138" width="46" height="46" class="cell-dark"/>
    <!-- Row 4 -->
    <rect x="0" y="184" width="46" height="46" class="cell-light"/>
    <rect x="46" y="184" width="46" height="46" class="cell-dark"/>
    <rect x="92" y="184" width="46" height="46" class="cell-light"/>
    <rect x="138" y="184" width="46" height="46" class="cell-dark"/>
    <rect x="184" y="184" width="46" height="46" class="cell-light"/>

    <!-- Dim rows below current row -->
    <rect x="0" y="138" width="230" height="92" class="cell-dim"/>

    <!-- Queen -->
    <text x="115" y="126" text-anchor="middle" class="queen">♛</text>

    <!-- Arrow UP -->
    <line x1="115" y1="92" x2="115" y2="15" class="arrow-dashed" marker-end="url(#arrowhead)"/>
    <!-- Arrow UP-LEFT -->
    <line x1="92" y1="92" x2="15" y2="15" class="arrow-dashed" marker-end="url(#arrowhead)"/>
    <!-- Arrow UP-RIGHT -->
    <line x1="138" y1="92" x2="215" y2="15" class="arrow-dashed" marker-end="url(#arrowhead)"/>
    
    <!-- Notation for un-checked areas -->
    <!-- Down -->
    <path d="M 115 145 L 115 210" stroke="#a8a8a8" stroke-width="2" stroke-dasharray="4 4" fill="none" marker-end="url(#arrowhead)"/>
    <text x="115" y="195" text-anchor="middle" font-size="20" class="x-icon">✖</text>

    <!-- Side labels -->
    <text x="-15" y="115" text-anchor="end" class="text-desc" font-weight="700">Row 2</text>
    <text x="-10" y="145" class="text-desc" font-size="11" fill="#888">Current Row</text>
  </g>

  <!-- Empty rows label -->
  <rect x="60" y="275" width="180" height="26" rx="4" fill="rgba(26,29,46,0.06)"/>
  <text x="150" y="293" text-anchor="middle" class="text-desc" font-size="12" fill="#555a78">Empty (Not reached yet)</text>

  <!-- Explanations on the right -->
  <g transform="translate(320, 100)">
    <text x="0" y="0" class="text-desc">Because we place queens <tspan class="text-bold">row by row</tspan></text>
    <text x="0" y="20" class="text-desc">from top to bottom, we NEVER check:</text>

    <!-- Don't check 1 -->
    <text x="0" y="55" class="x-icon">✖</text>
    <text x="25" y="55" class="text-desc"><tspan class="text-bold">Left / Right</tspan></text>
    <text x="25" y="75" class="text-desc" font-size="13">Only 1 queen is placed per row!</text>

    <!-- Don't check 2 -->
    <text x="0" y="110" class="x-icon">✖</text>
    <text x="25" y="110" class="text-desc"><tspan class="text-bold">Below (↙ ↓ ↘)</tspan></text>
    <text x="25" y="130" class="text-desc" font-size="13">These rows are completely empty.</text>

    <!-- Do check -->
    <text x="0" y="175" class="text-desc">We ONLY check <tspan class="text-bold">above</tspan> us:</text>
    
    <rect x="-10" y="195" width="220" height="85" rx="8" fill="rgba(99, 102, 241, 0.08)"/>
    <text x="10" y="220" class="check-icon" fill="#6366f1">✔</text>
    <text x="35" y="220" class="text-desc" font-weight="700" fill="#6366f1">↑ Straight Up</text>
    
    <text x="10" y="245" class="check-icon" fill="#6366f1">✔</text>
    <text x="35" y="245" class="text-desc" font-weight="700" fill="#6366f1">↖ Top-Left Diagonal</text>

    <text x="10" y="270" class="check-icon" fill="#6366f1">✔</text>
    <text x="35" y="270" class="text-desc" font-weight="700" fill="#6366f1">↗ Top-Right Diagonal</text>
  </g>
</svg>
