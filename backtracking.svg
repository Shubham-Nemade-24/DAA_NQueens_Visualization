<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .text-title { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 800; fill: #1a1d2e; }
      .text-desc { font-family: 'Inter', sans-serif; font-size: 14px; fill: #555a78; font-weight: 500; }
      .text-code { font-family: 'JetBrains Mono', monospace; font-size: 13px; fill: #ef4444; font-weight: 700; }
      .cell-light { fill: #f0d9b5; }
      .cell-dark { fill: #b58863; }
      .cell-highlight { fill: #6366f1; opacity: 0.9; }
      .queen { font-size: 32px; font-family: sans-serif; fill: #ffffff; }
      .queen-dark { font-size: 32px; font-family: sans-serif; fill: #1a1d2e; }
      .arrow { stroke: #10b981; stroke-width: 3; stroke-dasharray: 6 4; fill: none; }
      .arrow-head { fill: #10b981; }
      .x-mark { stroke: #ef4444; stroke-width: 4; stroke-linecap: round; }
      .badge-bg { fill: rgba(16, 185, 129, 0.1); rx: 6; }
      .badge-text { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; fill: #10b981; }
    </style>
  </defs>
  
  <rect width="600" height="400" class="bg" rx="12" />

  <!-- Layout: Board on left (240x240 @ 40,80), Explanations on right -->
  <text x="40" y="40" class="text-title">Backtracking Approach</text>
  <text x="40" y="60" class="text-desc">Places queens step-by-step. Discards invalid branches instantly.</text>

  <!-- Chessboard Base (240x240, 60px cells) -->
  <g transform="translate(40, 80)">
    <!-- Row 0 -->
    <rect x="0" y="0" width="60" height="60" class="cell-light"/>
    <rect x="60" y="0" width="60" height="60" class="cell-dark"/>
    <rect x="120" y="0" width="60" height="60" class="cell-light"/>
    <rect x="180" y="0" width="60" height="60" class="cell-dark"/>
    <!-- Row 1 -->
    <rect x="0" y="60" width="60" height="60" class="cell-dark"/>
    <rect x="60" y="60" width="60" height="60" class="cell-light"/>
    <rect x="120" y="60" width="60" height="60" class="cell-dark"/>
    <rect x="180" y="60" width="60" height="60" class="cell-light"/>
    <!-- Row 2 -->
    <rect x="0" y="120" width="60" height="60" class="cell-light"/>
    <rect x="60" y="120" width="60" height="60" class="cell-dark"/>
    <rect x="120" y="120" width="60" height="60" class="cell-light"/>
    <rect x="180" y="120" width="60" height="60" class="cell-dark"/>
    <!-- Row 3 -->
    <rect x="0" y="180" width="60" height="60" class="cell-dark"/>
    <rect x="60" y="180" width="60" height="60" class="cell-light"/>
    <rect x="120" y="180" width="60" height="60" class="cell-dark"/>
    <rect x="180" y="180" width="60" height="60" class="cell-light"/>

    <!-- Row 0 Placed Queen -->
    <rect x="60" y="0" width="60" height="60" class="cell-highlight"/>
    <text x="90" y="42" text-anchor="middle" class="queen">♛</text>

    <!-- Row 1 Testing -->
    <!-- Col 0 Attack -->
    <text x="30" y="102" text-anchor="middle" class="queen-dark" opacity="0.3">♛</text>
    <line x1="15" y1="75" x2="45" y2="105" class="x-mark"/>
    <line x1="45" y1="75" x2="15" y2="105" class="x-mark"/>
    
    <!-- Col 1 Attack -->
    <text x="90" y="102" text-anchor="middle" class="queen-dark" opacity="0.3">♛</text>
    <line x1="75" y1="75" x2="105" y2="105" class="x-mark"/>
    <line x1="105" y1="75" x2="75" y2="105" class="x-mark"/>

    <!-- Col 2 Attack -->
    <text x="150" y="102" text-anchor="middle" class="queen-dark" opacity="0.3">♛</text>
    <line x1="135" y1="75" x2="165" y2="105" class="x-mark"/>
    <line x1="165" y1="75" x2="135" y2="105" class="x-mark"/>

    <!-- Col 3 Safe -->
    <rect x="180" y="60" width="60" height="60" class="cell-highlight"/>
    <text x="210" y="102" text-anchor="middle" class="queen">♛</text>

    <!-- Row Labels -->
    <text x="-15" y="35" text-anchor="end" class="text-desc" font-weight="700">R0</text>
    <text x="-15" y="95" text-anchor="end" class="text-desc" font-weight="700">R1</text>
    <text x="-15" y="155" text-anchor="end" class="text-desc" font-weight="700" fill="#a8a8a8">R2</text>
    <text x="-15" y="215" text-anchor="end" class="text-desc" font-weight="700" fill="#a8a8a8">R3</text>
  </g>

  <!-- Explanations on the right -->
  <g transform="translate(320, 90)">
    <!-- Step 1 -->
    <circle cx="10" cy="10" r="10" fill="#6366f1"/>
    <text x="10" y="15" text-anchor="middle" fill="#fff" font-size="12" font-family="sans-serif" font-weight="bold">1</text>
    <text x="30" y="15" class="text-desc"><tspan font-weight="700" fill="#1a1d2e">Place</tspan> Queen in R0, C1.</text>

    <!-- Step 2 -->
    <circle cx="10" cy="50" r="10" fill="#ef4444"/>
    <text x="10" y="55" text-anchor="middle" fill="#fff" font-size="12" font-family="sans-serif" font-weight="bold">2</text>
    <text x="30" y="47" class="text-desc">In R1, C0 is attacked (diagonal).</text>
    <text x="30" y="65" class="text-desc"><tspan fill="#ef4444" font-weight="700">PRUNE branch early!</tspan> Saves 16 checks.</text>

    <!-- Step 3 -->
    <circle cx="10" cy="100" r="10" fill="#ef4444"/>
    <text x="10" y="105" text-anchor="middle" fill="#fff" font-size="12" font-family="sans-serif" font-weight="bold">3</text>
    <text x="30" y="97" class="text-desc">In R1, C1 &amp; C2 are also attacked.</text>
    <text x="30" y="115" class="text-desc"><tspan fill="#ef4444" font-weight="700">PRUNED.</tspan> Sub-trees completely skipped.</text>

    <!-- Step 4 -->
    <circle cx="10" cy="150" r="10" fill="#10b981"/>
    <text x="10" y="155" text-anchor="middle" fill="#fff" font-size="12" font-family="sans-serif" font-weight="bold">4</text>
    <text x="30" y="155" class="text-desc">C3 is SAFE. Branch continues.</text>

    <!-- Stats -->
    <rect x="0" y="200" width="230" height="40" rx="8" fill="rgba(16, 185, 129, 0.08)"/>
    <text x="115" y="225" text-anchor="middle" class="badge-text" fill="#10b981">Optimal Search: O(N!) = ~24 Nodes</text>
  </g>

  <!-- Illustration lines from board to text -->
  <path d="M 115 170 Q 150 130 310 130" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 4" fill="none" opacity="0.4"/>
  <path d="M 235 170 Q 280 180 310 240" stroke="#10b981" stroke-width="2" stroke-dasharray="4 4" fill="none" opacity="0.4"/>
</svg>
